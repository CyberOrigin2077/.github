<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" font-family="'Courier New', ui-monospace, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#04070d"/>
      <stop offset="0.55" stop-color="#070c16"/>
      <stop offset="1" stop-color="#03060c"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="1.05" r="0.85">
      <stop offset="0" stop-color="#00e5ff" stop-opacity="0.28"/>
      <stop offset="0.45" stop-color="#0090b0" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#00e5ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="hex" width="56" height="48" patternUnits="userSpaceOnUse" patternTransform="scale(1)">
      <path d="M14 0 L42 0 L56 24 L42 48 L14 48 L0 24 Z" fill="none" stroke="#0c3a44" stroke-width="1"/>
    </pattern>
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#0a1822" opacity="0.5"/>
    </pattern>
    <filter id="neon" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- base -->
  <rect width="1200" height="360" fill="url(#bg)"/>
  <rect width="1200" height="360" fill="url(#hex)" opacity="0.5"/>
  <rect width="1200" height="360" fill="url(#glow)"/>

  <!-- circuit traces -->
  <g stroke="#11525f" stroke-width="1" fill="none" opacity="0.7">
    <path d="M0 70 H260 L290 100 H520"/>
    <path d="M1200 290 H980 L950 260 H700"/>
    <path d="M0 300 H120 L150 270"/>
    <path d="M1200 60 H1040 L1010 90 H860"/>
    <circle cx="520" cy="100" r="3" fill="#00e5ff" stroke="none"/>
    <circle cx="700" cy="260" r="3" fill="#ff003c" stroke="none"/>
    <circle cx="150" cy="270" r="2.5" fill="#00ff9c" stroke="none"/>
  </g>

  <!-- katakana side columns -->
  <g font-size="15" fill="#15616e" opacity="0.8" letter-spacing="2">
    <text x="40" y="120" writing-mode="tb">サイバーオリジン</text>
    <text x="1158" y="150" writing-mode="tb" fill="#5a1530">物理世界</text>
  </g>

  <!-- corner frame -->
  <g stroke="#00e5ff" stroke-width="2" fill="none" opacity="0.9">
    <path d="M28 26 H92 M28 26 V90"/>
    <path d="M1172 334 H1108 M1172 334 V270"/>
  </g>
  <g stroke="#ff003c" stroke-width="2" fill="none" opacity="0.8">
    <path d="M1172 26 H1108 M1172 26 V70"/>
    <path d="M28 334 H80 M28 334 V286"/>
  </g>

  <!-- glitch blocks -->
  <g opacity="0.85">
    <rect x="250" y="150" width="60" height="6" fill="#ff003c" opacity="0.55"/>
    <rect x="900" y="205" width="90" height="5" fill="#00e5ff" opacity="0.5"/>
    <rect x="610" y="92" width="40" height="4" fill="#00ff9c" opacity="0.6"/>
  </g>

  <!-- TITLE with RGB split -->
  <g font-size="86" font-weight="bold" letter-spacing="10" text-anchor="middle" font-family="'Arial Black','Helvetica',sans-serif">
    <text x="596" y="178" fill="#ff003c" opacity="0.85" filter="url(#soft)">CYBERORIGIN</text>
    <text x="604" y="178" fill="#00e5ff" opacity="0.85" filter="url(#soft)">CYBERORIGIN</text>
    <text x="600" y="178" fill="#eaf6ff" filter="url(#neon)">CYBERORIGIN</text>
  </g>

  <!-- divider -->
  <g>
    <line x1="300" y1="206" x2="900" y2="206" stroke="#00e5ff" stroke-width="1" opacity="0.5"/>
    <rect x="592" y="201" width="16" height="10" fill="#04070d" stroke="#00e5ff" stroke-width="1"/>
  </g>

  <!-- subtitle -->
  <text x="600" y="246" text-anchor="middle" font-size="20" letter-spacing="7" fill="#9fe9ff" filter="url(#neon)">GROUND TRUTH FOR EMBODIED INTELLIGENCE</text>

  <!-- tagline -->
  <text x="600" y="290" text-anchor="middle" font-size="14" letter-spacing="3" fill="#ff2d6b">// 機械に物理世界を教える —— WE TEACH MACHINES THE PHYSICAL WORLD</text>

  <!-- status line -->
  <text x="600" y="322" text-anchor="middle" font-size="11" letter-spacing="5" fill="#2a6b54">[ SINGAPORE ]　[ EMBODIED AI · ROBOTICS ]　[ THE ORIGIN POINT OF MACHINE REALITY ]</text>

  <!-- scanlines on top -->
  <rect width="1200" height="360" fill="url(#scan)"/>
</svg>
